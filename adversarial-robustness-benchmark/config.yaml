# Global configuration for the Adversarial Robustness Benchmark.
# Every script and module reads paths, the seed, and hyperparameters from here.

# Reproducibility: fixed across torch, numpy and Python random.
seed: 42

paths:
  data_root: data
  clean_set: data/clean          # original (unmodified) benchmark images
  poisoned_set: data/poisoned    # generated later (Phase 1) — not built yet
  hf_cache: data/_hf_cache       # downloaded parquet shards
  results: results

# Benchmark dataset — an ImageNet-validation subset.
dataset:
  benchmark_size: 1000           # total images; expandable to 5000 later
  per_class: 1                   # class-balanced: images per ImageNet class
  num_classes: 1000
  # Public, non-gated ImageNet-1k mirror (images pre-resized to 256px).
  hf_repo: evanarlian/imagenet_1k_resized_256
  hf_split: val
  # CIFAR-100 is used only in Phase 4 (defense fine-tuning); torchvision downloads it.
  train_dataset: cifar100

# Primary threat model: L-infinity. Epsilon lives in [0,1] pixel space.
attack:
  threat_model: Linf
  epsilon: 0.03137254901960784    # 8/255
  pgd_step: 0.00784313725490196   # 2/255
  pgd_iters: 20
  fgsm_epsilon: 0.03137254901960784
  # AutoAttack and Square are expensive; evaluate on a class-balanced subset.
  # Built by datasets.loader.load_eval_subset(n, seed=<global seed>), so the
  # same 200 images are selected every run — results are fully reproducible.
  # Because the clean set has 1 image per class and subset < num_classes, the
  # sampler randomly picks `subset` distinct classes (seeded) and takes their
  # one image each — a uniform sample over the label space, NOT classes 0..199.
  # Labels are taken directly from the clean-set manifest (same source as the
  # full evaluation) — no separate label file needed.
  # Disclose in paper: "AutoAttack and Square evaluated on a 200-image
  # class-balanced subset due to compute cost." Set to null for the full 1000.
  autoattack_eval_subset: 200
  square_eval_subset: 200

# The 7 benchmarked architectures (short keys -> wrappers in models/classifiers.py).
models:
  - resnet50
  - vgg16
  - convnext_tiny
  - vit_b_16
  - swin_t
  - efficientnet_b0
  - clip_vit_b16

# RobustBench adversarially-trained model — the robustness-ceiling reference.
robustbench_model:
  name: Salman2020Do_R50
  threat_model: Linf
  dataset: imagenet

# Phase C — defense model (Madry-style PGD adversarial fine-tuning).
defense:
  base_arch: resnet50
  num_classes: 100              # ImageNet classes to fine-tune on
  images_per_class: 200         # ~20k training images total
  epochs: 3
  batch_size: 64
  lr: 0.001                     # low for fine-tune (vs Madry's 0.1 from-scratch)
  momentum: 0.9
  weight_decay: 5.0e-4
  pgd_epsilon: 0.03137254901960784   # 8/255 — same as eval threat model
  pgd_alpha: 0.00784313725490196     # 2/255
  pgd_steps: 5                       # cheaper than eval-time PGD-20
  num_workers: 2
  checkpoint_dir: models/checkpoints
  # Default training-data location — override with --train-dir on the CLI.
  # On Kaggle, add the `ambityga/imagenet100` dataset (or similar) and point
  # this at the WNID-folder root.
  train_dir: /kaggle/input/imagenet100/train
